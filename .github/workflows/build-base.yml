name: Build base image

# Builds the alpasim base image natively on a GitHub-hosted amd64 runner
# (no QEMU) and pushes it to ghcr.io under the repository owner's namespace.
# Trigger manually from the Actions tab via "Run workflow".

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (e.g. 0.91.0)"
        required: true
        default: "0.91.0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      # CUDA + Torch + Rust is large; reclaim ~30 GB from the default ~14 GB runner.
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image ref
        id: ref
        shell: bash
        run: |
          set -euo pipefail
          # OCI refs must be lowercase; owner may contain uppercase letters.
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner_lc}/alpasim-base:${{ inputs.version }}" >> "${GITHUB_OUTPUT}"

      - name: Build and push (linux/amd64, native)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ref.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
